              value: 218134959-mr-whisper
        - name: user_slug
          in: path
          required: true
          schema:
            type: string
          example: 179929687-zayd-khan
        - $ref: "#/components/parameters/Ref"
      x-observed:
        artifacts:
          - goodreads/proofs/user-pages-map-batch2-2026-05-22.json
          - goodreads/proofs/notes-interaction-mr-whisper-2026-05-22.json
          - goodreads/proofs/notes-publicize-verify-2026-05-22.json
        status: 200
      responses:
        "200":
          $ref: "#/components/responses/HtmlPage"

  /notes/{book_id}/share:
    put:
      tags: [notes]
      summary: Bulk publicize or hide notes/highlights for a book.
      description: |
        Observed through the "Make all N visible" and "Hide all" buttons.
        This is a real account mutation. Send form body `visible=true` to publicize
        or `visible=false` to hide. Verified via live CDP network capture 2026-06-08.
        Use dry-run by default and verify on reload by counting `.js-readingNote[data-visible=true]`.
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
          examples:
            mrWhisper:
              value: 218134959
            girlBeneathTheSea:
              value: 48526390
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                visible:
                  type: string
                  enum: ["true", "false"]
                  description: Set to "true" to make all annotations visible, "false" to hide all.
              required: [visible]
      x-observed:
        artifact: goodreads/proofs/notes-publicize-writes-2026-05-22.json
        status: 200
        approved_write_scope: pasted notes pages only
      x-safety:
        default: dry-run
        requires_explicit_execute: true
        verify_after_write: reload
      responses:
        "200":
          $ref: "#/components/responses/XhrHtmlOrJson"

  /notes/{book_id}/{annotation_pair_id}/note:
    post:
      tags: [notes]
      summary: Likely per-note "add your thoughts" persistence endpoint.
      description: |
        Discovered from `.js-readingNote[data-note-persist-endpoint]` DOM attributes. Not submitted in this run.
        Method and payload need a dedicated approved write capture before CLI execution support.
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: integer
        - name: annotation_pair_id
          in: path
          required: true
          schema:
            type: string
      x-observed:
        artifact: goodreads/proofs/notes-dom-mr-whisper-2026-05-22.json
        source: DOM attribute
        submitted: false
      x-confidence: low-unsubmitted
      x-safety:
        default: disabled
        requires_approved_write_capture: true
      responses:
        "200":
          $ref: "#/components/responses/XhrHtmlOrJson"

