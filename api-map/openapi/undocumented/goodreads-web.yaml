openapi: 3.1.0
info:
  title: Goodreads Web Undocumented API Map
  version: 0.1.0
  summary: Route map derived from authenticated Goodreads web traffic and DOM inspection.
  description: |
    This is an evidence-backed map of the Goodreads web surface. Goodreads has no current
    public developer API, so these routes are reverse-engineered from the logged-in web app.

    Evidence was captured on 2026-05-22 with browser-harness-js. Raw artifacts live under
    proofs/ and are mode 0600 because they contain account-visible metadata.

    This spec intentionally does not include cookies, CSRF tokens, request headers, response bodies,
    or raw Kindle highlight text.
servers:
  - url: https://www.goodreads.com
security:
  - goodreadsCookieSession: []
tags:
  - name: profile
  - name: shelves
  - name: books
  - name: notes
  - name: social
  - name: discovery
  - name: analytics
components:
  securitySchemes:
    goodreadsCookieSession:
      type: apiKey
      in: cookie
      name: _session_id2
      description: Authenticated Goodreads browser cookie. Amazon SSO cookies may also be required after redirect/login.
  parameters:
    Shelf:
      name: shelf
      in: query
      required: false
      schema:
        type: string
        examples:
          - read
          - currently-reading
          - to-read
          - did-not-finish
          - for-the-aesthetic
          - want-to-read-again
    Ref:
      name: ref
      in: query
      required: false
      schema:
        type: string
  responses:
    HtmlPage:
      description: HTML page rendered by Goodreads.
      content:
        text/html:
          schema:
            type: string
    XhrHtmlOrJson:
      description: XHR response. Observed routes can return HTML fragments, JavaScript, or JSON-like payloads depending on route.
      content:
        text/html:
          schema:
            type: string
        application/json:
          schema:
            type: object
            additionalProperties: true
        application/javascript:
          schema:
            type: string
    Empty:
      description: Empty or tracking response.
    XmlFeed:
      description: XML feed or descriptor.
      content:
        application/xml:
          schema:
            type: string
paths:
  /:
    get:
      tags: [profile]
      summary: Recent updates home/feed page.
      x-observed:
        artifact: goodreads/proofs/network-seed-2026-05-22.json
        status: 200
      responses:
        "200":
          $ref: "#/components/responses/HtmlPage"

  /user/show/{user_slug}:
    get:
      tags: [profile]
      summary: User profile page.
      parameters:
        - name: user_slug
          in: path
          required: true
          schema:
            type: string
          example: 179929687-zayd-khan
      x-observed:
        artifacts:
          - goodreads/proofs/user-pages-map-2026-05-22.json
          - goodreads/proofs/user-pages-map-batch2-2026-05-22.json
        status: 200
      responses:
        "200":
          $ref: "#/components/responses/HtmlPage"

  /user/delayable_user_show/{user_id}:
    get:
      tags: [profile]
      summary: Profile delay-loaded sections.
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
          example: 179929687
        - name: skip_cache
          in: query
          required: false
          schema:
            type: boolean
        - name: csm_scope
          in: query
          required: false
          schema:
            type: string
      x-observed:
        artifacts:
          - goodreads/proofs/user-pages-map-2026-05-22.json
          - goodreads/proofs/user-pages-map-batch2-2026-05-22.json
        status: 200
        resourceType: XHR
      responses:
        "200":
          $ref: "#/components/responses/XhrHtmlOrJson"

  /review/list/{user}:
    get:
      tags: [shelves]
      summary: Bookshelf list for a user, optionally filtered by shelf.
      parameters:
        - name: user
          in: path
          required: true
          schema:
            type: string
          examples:
            numeric:
              value: "179929687"
            slugged:
              value: "179929687-zayd-khan"
        - $ref: "#/components/parameters/Shelf"
        - name: print
          in: query
          required: false
          schema:
            type: boolean
      x-observed:
        artifacts:
          - goodreads/proofs/user-pages-map-2026-05-22.json
          - goodreads/proofs/user-pages-map-batch2-2026-05-22.json
          - goodreads/proofs/nav-bookshelves-links-2026-05-22-v3.json
        status: 200
      responses:
        "200":
          $ref: "#/components/responses/HtmlPage"

  /review/list:
    get:
      tags: [shelves]
      summary: Current user's My Books page.
      parameters:
        - $ref: "#/components/parameters/Shelf"
        - $ref: "#/components/parameters/Ref"
      x-observed:
        artifacts:
          - goodreads/proofs/goodreads-genres-anchor-sample-2026-05-25.txt
          - goodreads/proofs/nav-bookshelves-links-2026-05-22-v3.json
        source: navigation link
      responses:
        "200":
          $ref: "#/components/responses/HtmlPage"

  /review/list_rss/{user}:
    get:
      tags: [shelves]
      summary: Public shelf RSS feed for a user's books.
      description: |
        This public XML route is the cleanest current read API for shelf exports. Authenticated shelf pages
        can expose a private keyed RSS URL; do not log or commit that key.
      parameters:
        - name: user
          in: path
          required: true
          schema:
            type: string
          example: "179929687"
        - $ref: "#/components/parameters/Shelf"
        - name: key
          in: query
          required: false
          schema:
            type: string
          description: Optional private feed key from a logged-in page. Redact if present.
      x-observed:
        artifact: goodreads/research/current-api-sweep-2026-05-22.md
        status: 200
        contentType: application/xml
        auth_required: false
        observed_item_counts:
          read: 40
          to-read: 100
      x-safety:
        may_contain_private_key: true
        prefer_public_numeric_url: true
        not_full_export_for_large_shelves: true
      responses:
        "200":
          $ref: "#/components/responses/XmlFeed"

  /tooltips:
    get:
      tags: [books]
      summary: Batch tooltip metadata for book ids shown in shelf/list pages.
      parameters:
        - name: resources[Book.{id}][id]
          in: query
          required: false
          schema:
            type: string
          description: Goodreads emits one pair per book id.
        - name: resources[Book.{id}][type]
          in: query
          required: false
          schema:
            type: string
            const: Book
        - name: use_wtr_tooltip
          in: query
          required: false
          schema:
            type: boolean
      x-observed:
        artifacts:
          - goodreads/proofs/network-seed-2026-05-22.json
          - goodreads/proofs/user-pages-map-2026-05-22.json
          - goodreads/proofs/user-pages-map-batch2-2026-05-22.json
        status: 200
        resourceType: XHR
      responses:
        "200":
          $ref: "#/components/responses/XhrHtmlOrJson"

  /book/show/{book_slug}:
    get:
      tags: [books]
      summary: Book detail page. Current page is Next.js-backed.
      parameters:
        - name: book_slug
          in: path
          required: true
          schema:
            type: string
          example: 57905101-the-gate-of-the-feral-gods
      x-observed:
        artifact: goodreads/proofs/user-pages-map-batch2-2026-05-22.json
        status: 200
      responses:
        "200":
          $ref: "#/components/responses/HtmlPage"

  /book:
    get:
